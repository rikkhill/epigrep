name: Release

# Build the multi-platform wheel matrix + sdist, then publish via PyPI trusted
# publishing (OIDC — no long-lived tokens).
#
#   * push a tag matching v*           -> build and publish to PyPI
#   * run manually (workflow_dispatch) -> build, and publish to the chosen
#                                         index (default TestPyPI for rehearsal)
#
# Trusted publishing must be configured once on the index side before the
# publish jobs can succeed (see docs/RELEASE-GATE.md): a pending publisher for
# project "epigrep", owner "rikkhill", repo "epigrep", workflow "release.yml",
# and environment "pypi" (and "testpypi" on test.pypi.org for rehearsals).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      index:
        description: "Index to publish to"
        type: choice
        options: [testpypi, pypi]
        default: testpypi

permissions:
  contents: read

jobs:
  build:
    name: wheels (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    # Most wheels build in a couple of minutes; the experimental Intel-macOS
    # entry gets a much longer budget because its hosted runner queue can be
    # slow to assign. continue-on-error (below) keeps a stalled Intel job from
    # failing or blocking the run — the publish step uses skip-existing.
    timeout-minutes: ${{ matrix.timeout || 30 }}
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64 }
          - { os: ubuntu-latest,  target: aarch64 }
          # Intel macOS (macos-13): experimental. Dropped earlier because the
          # hosted runner queue stalled and blocked publish; re-added with a
          # long timeout and continue-on-error to see whether it eventually
          # completes without holding up the rest of the matrix. Apple Silicon
          # is still the macOS wheel that matters; Intel Macs otherwise fall
          # back to building from the sdist.
          - { os: macos-13,       target: x86_64, experimental: true, timeout: 120 }
          - { os: macos-14,       target: aarch64 }
          - { os: windows-latest, target: x64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --manifest-path crates/epigrep-py/Cargo.toml
          manylinux: auto
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path crates/epigrep-py/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish-testpypi:
    name: Publish to TestPyPI
    needs: [build, sdist]
    if: github.event_name == 'workflow_dispatch' && inputs.index == 'testpypi'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    needs: [build, sdist]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.index == 'pypi')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
